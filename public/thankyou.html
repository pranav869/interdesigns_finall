<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Inter Designs</title>
  <link rel="icon" type="image/webp" href="/favicon.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C7A86D;
      --black: #0F1115;
      --white: #FFFFFF;
      --muted: rgba(255, 255, 255, 0.6);
      --surface: #14171F;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    .container {
      max-width: 600px;
      padding: 3rem;
      background: var(--surface);
      border: 1px solid rgba(199, 168, 109, 0.2);
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 1rem;
      font-weight: 500;
    }
    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 2rem;
      font-weight: 300;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 30px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    a.btn:hover {
      background: var(--gold);
      color: var(--black);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Thank You</h1>
    <p>We have received your request for a consultation. Our design team will reach out to you shortly to discuss your vision.</p>
    <a href="/" class="btn">Return Home</a>
  </div>
</body>
</html>
